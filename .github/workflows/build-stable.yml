name: Build Stable Telewebion M3U

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests requests-oauthlib
      - run: python iptv_builder.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable.m3u
          git diff --cached --quiet || git commit -m "Auto-update stable.m3u - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
